<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Welcome to my E-commerce wepsite</title>
        <link rel="stylesheet" type="text/css" href="main.css">
    </head>

    <body class="slbody">
        <h1 class="slh1">Welcome to my E-commerce wepsite</h1>
        <form method="POST" autocomplete="on">
            <p>
                <lable>이름</lable>
                <input name="이름" type="text" autofocus  placeholder="이름을 입력하세요" required/>
                (필수)
            </p>
            <p>
                <label>성별</label>
                <label>남
                    <input name = "성별" type="radio" value="남" checked/></label>
                <label>여
                    <input name = "성별" type="radio" value="여"/></label>
            </p>
            <p>
                <label>생일</label>
                <input name="생일" type="date"/>
            </p>
            <p>
                <label>학년</label>
                <input name="학년" type="number" min="1" max="4"/>
            </p>
            <p>
                <label>전화번호</label>
                <input name="전화번호" type="tel" placeholder="(###) ####-####"
                pattern="\(\d{3}\) + \d{4}-\d{4}"/>
            </p>
            <p>
                <label>ID</label>
                <input name="ID" type="email" placeholder="ID를 입력하세요(email)" required/>
                (필수)
            </p>
            <p>
                <label>PASSWORD</label>
                <input name="password" type="password" minlength="10" placeholder="비밀번호를 입력하세요" required/>
                (필수)
            </p>
            <p>
                <input type="submit" value="Signup" class="submit"/>
                <input type="reset" value="Clear" class="reset"/>
            </p>
        </form>
        <table class="sltable">
            <tbody>
                <th><a href="login.html">로그인</a></th>
            </tbody>
        </table>
    </body>
</html>
